# Bristlenose Dependabot config.
#
# Policy lives in docs/design-platform-policy.md.
# Selective major-ignore: only deps that empirically caused rework when
# auto-bumped. New entries land in the register with a reason and a
# re-check date in the policy doc.
#
# Security advisories bypass `ignore` rules. Dependabot still opens a PR
# for any CVE-flagged version regardless of the version-update filter.
#
# Before merging a batch of these PRs (or a coordinated tooling sprint),
# run `/cassandra` — it pre-mortems the blast radius of the bumps and
# records the prophecy for later calibration.
# See docs/design-dependency-premortem.md.

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "cassiocassio"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Major bumps for runtime/foundation packages that drag the
      # ecosystem with them. Bump in coordinated tooling sprints, not
      # one-off PRs. Leave most pip majors flowing — Python wheel
      # ecosystem is more stable major-to-major than npm.
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      # spaCy ecosystem cluster — HELD, not dead-pinned. spaCy 3.8.x pins
      # thinc<8.4 + weasel<0.5; thinc pins confection<1.0; weasel 1.0
      # *requires* confection>=1.0 (mutually exclusive with thinc 8.3). The
      # 1.x/9.x generation is spaCy-4 era. A lone bump of any of the three is
      # a guaranteed resolver-red while spaCy is 3.8, and it would take the
      # Presidio PII path down with it.
      #   Release-condition (lifts this ignore): spaCy 4 reaches GA and we
      #   take the spaCy-4 wave (spacy + thinc + weasel + confection +
      #   srsly/preshed/cymem/murmurhash/blis + en_core_web_lg re-pin) as one
      #   atomic move. Re-checked by `/cassandra --watch`, not by hand.
      #   See docs/dependency-premortem-log.md § Held register.
      - dependency-name: "thinc"
        update-types: ["version-update:semver-major"]
      - dependency-name: "weasel"
        update-types: ["version-update:semver-major"]
      - dependency-name: "confection"
        update-types: ["version-update:semver-major"]
      # HELD (resolver-gated), not dead-pinned. transformers 5.7.x AND
      # 5.10.x both pin `tokenizers<=0.23.0` (deps.dev verified 2026-06-05);
      # tokenizers 0.23.1 violates it, so a lone or grouped bump goes
      # resolver-red. Block 0.23.1+ until a transformers release floats the
      # cap, then move tokenizers+transformers together. Re-checked by
      # `/cassandra --watch`.
      #   See docs/dependency-premortem-log.md § Held register.
      - dependency-name: "tokenizers"
        versions: [">=0.23.1"]
      # WTForms hold GRADUATED 2026-06-09: sqladmin 0.27.2 (2026-06-08)
      # floated its cap to `wtforms>=3.1,<3.3`. Pair (sqladmin 0.27.2 +
      # WTForms 3.2.2) taken; ignore dropped. See
      # docs/dependency-premortem-log.md § `--watch` 2026-06-09.

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "cassiocassio"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Tied to Node major: bumping these uncoordinated has caused
      # rework historically. See CHANGELOG v0.14.5 for jsdom + Node 25.
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      # ESLint / typescript-eslint move with Node and TypeScript;
      # cap-mismatches caused npm-ci failures in v0.14.5. Take majors
      # deliberately, alongside the Node bump.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Notable allow-list: react / react-dom / react-router /
      # react-router-dom / i18next / react-i18next majors continue to
      # flow as PRs. Most have been painless (react-i18next 17 was a
      # one-line peer-dep tightening). Hand-review each one.

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "cassiocassio"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Lighthouse 13 requires Node ≥22.19, which CI satisfies (Node 24
      # per .tool-versions). Major still ignored pending a deliberate audit
      # of the bundled-Chromium channel and any audit-ID drift; no e2e spec
      # asserts on Lighthouse audit IDs today (grep clean), so the cost of
      # taking it is mostly a perf-baseline re-pin. Drop this ignore when
      # someone runs `/cassandra` on a Lighthouse 13 PR.
      - dependency-name: "lighthouse"
        update-types: ["version-update:semver-major"]
      # Playwright majors occasionally rotate the bundled Chromium /
      # WebKit channel and break the e2e fixtures; coordinate.
      - dependency-name: "@playwright/test"
        update-types: ["version-update:semver-major"]
