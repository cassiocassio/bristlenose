name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # allow release.yml to invoke this workflow

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    # macOS is informational — catches platform bugs without blocking merges
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        # Informational for now — 9 pre-existing errors from third-party
        # SDK type mismatches (anthropic, presidio, faster-whisper).
        # Runs so regressions show in the log; does not block the build.
        continue-on-error: true
        run: mypy bristlenose/ --ignore-missing-imports

      - name: Audit dependencies for known vulnerabilities
        # Informational — flags known CVEs in the log but doesn't block
        # the build. Transitive deps (torch, protobuf) often have unfixed
        # advisories that we can't act on. Review on each run.
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      - name: Generate Python SBOM
        # CycloneDX Software Bill of Materials — uploaded as CI artifact
        # for compliance (US EO 14028, EU Cyber Resilience Act).
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom-python.json

      - name: Upload Python SBOM
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json
          retention-days: 90

      - name: Check man page version matches __version__
        run: |
          VERSION=$(python3 -c "import bristlenose; print(bristlenose.__version__)")
          grep -q "bristlenose $VERSION" man/bristlenose.1 || {
            echo "::error::Man page version doesn't match __version__ ($VERSION)"
            echo "Update the .TH line in man/bristlenose.1"
            exit 1
          }

      - name: Run tests
        run: pytest --tb=short -q -m "not slow" --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage.xml
          retention-days: 90

  frontend-lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        # Informational — 84 pre-existing problems (jsx-a11y plugin missing,
        # react-hooks strict rules). Fix incrementally; don't block CI yet.
        continue-on-error: true
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Audit frontend dependencies for known vulnerabilities
        # Informational — flags known CVEs in the log but doesn't block
        # the build. Production deps are the future blocking gate;
        # full audit (incl. dev deps like Vite) is informational because
        # dev deps execute during build and produce shipped artifacts.
        continue-on-error: true
        working-directory: frontend
        run: |
          echo "=== Production dependencies ==="
          npm audit --omit=dev
          echo ""
          echo "=== All dependencies (including build-time) ==="
          npm audit || true

      - name: Generate frontend SBOM
        continue-on-error: true
        working-directory: frontend
        run: npm sbom --sbom-format cyclonedx > sbom-frontend.json

      - name: Upload frontend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: frontend/sbom-frontend.json
          retention-days: 90

      - name: Frontend tests (Vitest)
        working-directory: frontend
        run: npm test

  e2e:
    needs: [lint-and-test, frontend-lint-type-test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (including serve extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium webkit --with-deps

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
