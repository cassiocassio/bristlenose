name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # allow release.yml to invoke this workflow

# Silence the per-step "actions/checkout@v4 is running on Node 20"
# deprecation chatter and run JS actions on Node 24 ahead of the June
# 2026 default switch.  Matches the Node version pinned for local dev.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege default: the automatic GITHUB_TOKEN is read-only for every
# job unless a job opts into more. Without this, the token inherits the repo
# default (often read/write), so a compromised dependency in any step could
# push commits or open releases. Supply-chain hardening 2026-06-04.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.tool-versions'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        # Informational for now — 9 pre-existing errors from third-party
        # SDK type mismatches (anthropic, presidio, faster-whisper).
        # Runs so regressions show in the log; does not block the build.
        continue-on-error: true
        run: mypy bristlenose/ --ignore-missing-imports

      - name: Check man page version matches __version__
        run: |
          VERSION=$(python3 -c "import bristlenose; print(bristlenose.__version__)")
          grep -q "bristlenose $VERSION" man/bristlenose.1 || {
            echo "::error::Man page version doesn't match __version__ ($VERSION)"
            echo "Update the .TH line in man/bristlenose.1"
            exit 1
          }

      - name: Audit dependencies for known vulnerabilities
        # Informational — flags known CVEs in the log but doesn't block
        # the build. Transitive deps (torch, protobuf) often have unfixed
        # advisories that we can't act on. Review on each run.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      - name: Generate Python SBOM
        # CycloneDX Software Bill of Materials — uploaded as CI artifact
        # for compliance (US EO 14028, EU Cyber Resilience Act).
        continue-on-error: true
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom-python.json

      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json
          retention-days: 90

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    # macOS is informational — catches platform bugs without blocking merges
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    strategy:
      fail-fast: false
      matrix:
        # Multi-version test matrix. Lower bound must match
        # pyproject.toml `requires-python` (currently ">=3.10").
        # Primary dev version lives in .tool-versions; this matrix is
        # intentionally independent and bumped manually on a yearly cadence.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Run tests
        run: pytest --tb=short -q -m "not slow" --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 90

  frontend-lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        # Informational — 84 pre-existing problems (jsx-a11y plugin missing,
        # react-hooks strict rules). Fix incrementally; don't block CI yet.
        continue-on-error: true
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Audit frontend dependencies for known vulnerabilities
        # Informational — flags known CVEs in the log but doesn't block
        # the build. Production deps are the future blocking gate;
        # full audit (incl. dev deps like Vite) is informational because
        # dev deps execute during build and produce shipped artifacts.
        continue-on-error: true
        working-directory: frontend
        run: |
          echo "=== Production dependencies ==="
          npm audit --omit=dev
          echo ""
          echo "=== All dependencies (including build-time) ==="
          npm audit || true

      - name: Generate frontend SBOM
        continue-on-error: true
        working-directory: frontend
        run: npm sbom --sbom-format cyclonedx > sbom-frontend.json

      - name: Upload frontend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-frontend
          path: frontend/sbom-frontend.json
          retention-days: 90

      - name: Frontend tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: npx size-limit

  e2e:
    needs: [test, frontend-lint-type-test]
    runs-on: ubuntu-latest
    # Fail fast instead of burning the default 6h job ceiling. A hung
    # Playwright download (see the install step) once stalled this job for
    # 6h on 2026-06-03, which auto-cancelled the parent CI + Perf workflows.
    # Rule + postmortem: docs/design-ci.md § Timeouts and external-download
    # resilience.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.tool-versions'

      - name: Install Python dependencies (including serve extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        # `playwright install` has no internal download deadline: a half-open
        # CDN socket hangs forever (it stalled 6h on 2026-06-03). Bound each
        # attempt with `timeout` — a healthy download finishes in seconds, so
        # 5m is generous — and retry to ride out a transient CDN stall.
        # `--with-deps` also shells to apt-get, which fails *fast* (exit 100, not a
        # hang, so `timeout` can't catch it) when the runner's background apt /
        # unattended-upgrades holds the dpkg lock — so wait the lock out first.
        # See docs/design-ci.md § Timeouts and external-download resilience.
        timeout-minutes: 18
        run: |
          n=0
          until [ "$n" -ge 3 ]; do
            sudo bash -c 'w=0; while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && [ "$w" -lt 36 ]; do echo "dpkg lock held — waiting"; sleep 5; w=$((w+1)); done'
            timeout 5m npx playwright install chromium webkit --with-deps && exit 0
            n=$((n + 1))
            echo "::warning::playwright browser install attempt $n stalled or failed; retrying in 15s"
            sleep 15
          done
          echo "::error::playwright browser install failed after 3 attempts"
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          CI: true
          # Pin the server's auth token so Node-side fetch() in fixtures and
          # in-browser fetch() in page.evaluate() can send the same bearer.
          # See frontend/CLAUDE.md and root CLAUDE.md for the consuming paths.
          _BRISTLENOSE_AUTH_TOKEN: test-token

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

# perf-gate moved to .github/workflows/perf.yml (post-merge only on main).
# See that file + docs/private/handoffs/ci-reshape.md for rationale.
