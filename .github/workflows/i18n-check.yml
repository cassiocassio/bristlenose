name: i18n check

on:
  push:
    branches: [main]
    paths:
      - "bristlenose/locales/**"
  pull_request:
    branches: [main]
    paths:
      - "bristlenose/locales/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-locales:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate locale files
        run: python scripts/check-locales.py
