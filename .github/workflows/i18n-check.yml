name: i18n check

on:
  push:
    branches: [main]
    paths:
      - "bristlenose/locales/**"
  pull_request:
    branches: [main]
    paths:
      - "bristlenose/locales/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege default — GITHUB_TOKEN read-only (this workflow only reads
# and validates locale files). Supply-chain hardening 2026-06-04.
permissions:
  contents: read

jobs:
  validate-locales:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.tool-versions'

      - name: Validate locale files
        run: python scripts/check-locales.py
