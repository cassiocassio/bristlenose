name: Release to PyPI

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege default — read-only token for every job. The two jobs that
# need to write (publish → id-token: write for PyPI OIDC; github-release →
# contents: write) declare their own permissions block, which fully overrides
# this default for that job. Supply-chain hardening 2026-06-04.
permissions:
  contents: read

jobs:
  # Run the full CI suite first — don't publish a broken release.
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest

    # Elevated over the read-only default so this job can mint a signed
    # SBOM attestation (attest-sbom below). id-token: write is the OIDC
    # handle Sigstore uses to key the signature to this workflow run;
    # attestations: write lets it publish to the repo's attestation store.
    # Supply-chain hardening 2026-07-03.
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Primary Node and Python versions read from .tool-versions at repo root.
          python-version-file: '.tool-versions'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'

      - name: Build React frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install build tools
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      # SBOMs scoped to what actually ships, not the CI venv. The Python
      # SBOM is generated from a clean install of the built wheel (runtime
      # deps only — no pytest/ruff/build tooling), unlike ci.yml's
      # `environment` SBOM which snapshots the dev+serve superset. The
      # frontend SBOM intentionally keeps dev deps: Vite et al. execute at
      # build time and produce the shipped bundle (baked into the wheel).
      # No continue-on-error here — a release with no bill of materials
      # should fail loud, not ship silently.
      - name: Generate SBOMs (CycloneDX)
        run: |
          mkdir -p sbom
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --upgrade pip
          /tmp/sbom-venv/bin/pip install dist/*.whl
          pip install cyclonedx-bom
          cyclonedx-py environment /tmp/sbom-venv/bin/python -o sbom/sbom-python.json
          (cd frontend && npm sbom --sbom-format cyclonedx > ../sbom/sbom-frontend.json)

      # Bind the Python SBOM to the built artifacts (wheel + sdist) with a
      # Sigstore-signed attestation. Verifiable by anyone:
      #   gh attestation verify dist/<wheel> --repo cassiocassio/bristlenose
      # This is the step that turns "here's a dependency list" into "here's
      # a signed bill of materials for this exact artifact." The frontend
      # SBOM rides in the release assets but isn't separately attested — it's
      # already inside the attested wheel (bristlenose/server/static).
      - name: Attest SBOM against built artifacts
        uses: actions/attest-sbom@v2
        with:
          subject-path: 'dist/*'
          sbom-path: 'sbom/sbom-python.json'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifacts
        # Kept OUT of dist/ on purpose: gh-action-pypi-publish uploads
        # everything in dist/, and a stray .json would break the PyPI push.
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    needs: build
    runs-on: ubuntu-latest

    # Required for PyPI trusted publishing (OIDC).
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/bristlenose/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # DO NOT SHA-pin this one (cf. the peter-evans pin in notify-homebrew).
        # PyPA's first-party publisher is the documented exception: the moving
        # @release/v1 tag has to track PyPI's Trusted-Publishing changes, and
        # pinning it to a commit strands us on stale OIDC behaviour. With
        # id-token: write present (above), this action also uploads PEP 740
        # provenance attestations by default — that's the "Verified" panel on
        # the PyPI release files. Trusted Publishing (OIDC, no long-lived token).
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" --generate-notes
          man/bristlenose.1
          sbom/sbom-python.json
          sbom/sbom-frontend.json

  verify-pypi:
    # Independent check that PyPI actually accepted the upload. Runs in
    # parallel to github-release (does NOT gate it). Fails the workflow
    # red if PyPI's JSON endpoint doesn't surface the expected version
    # within ~10 minutes. PyPI's Fastly cache can be up to ~5 min stale,
    # so a single curl will false-negative; we poll. Does NOT auto-delete
    # the tag — twine has already consumed the version immutably by the
    # time we get here, and auto-deletion would mask that.
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Poll PyPI for the published version
        run: |
          expected="${GITHUB_REF_NAME#v}"
          echo "Looking for bristlenose==$expected on PyPI"
          for i in $(seq 1 20); do
            published=$(curl -fsSL https://pypi.org/pypi/bristlenose/json | jq -r .info.version || echo "")
            echo "[attempt $i] PyPI reports: $published"
            if [ "$published" = "$expected" ]; then
              echo "✅ PyPI accepted $expected"
              exit 0
            fi
            sleep 30
          done
          echo "::error::PyPI never surfaced $expected after 20 attempts (~10 min)."
          echo "::error::Twine likely consumed the version already — do NOT delete the tag."
          echo "::error::Check https://pypi.org/project/bristlenose/ and the publish job log."
          exit 1

  notify-homebrew:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Dispatch Homebrew tap update
        # SHA-pinned (supply-chain): a moving tag like @v3 lets the action's
        # author (or anyone who compromises their account) swap the code this
        # workflow runs — and this step holds HOMEBREW_TAP_TOKEN. Pin to an
        # immutable commit; the trailing comment tracks the human version so
        # Dependabot can still propose upgrades. See docs/design-ci.md.
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: cassiocassio/homebrew-bristlenose
          event-type: update-formula
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
