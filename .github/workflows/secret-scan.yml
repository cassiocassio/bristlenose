name: Secret & privacy scan

# Two portable, contributor-inherited guards:
#   1. gitleaks — scans full git history for leaked credentials (API keys,
#      tokens). Catches secrets local pre-commit hooks miss (contributors who
#      never ran `pre-commit install`, or a secret added-then-removed within a
#      PR's commit range).
#   2. tracked-vs-gitignore — the STRUCTURAL privacy guard. Fails if any tracked
#      file matches a .gitignore rule, i.e. something committed before its ignore
#      rule existed or force-added. This is the exact failure mode that exposed
#      docs/private/. It needs no private-stem list, so it stays public-safe.
#
# gitleaks scans secrets; the structural check scans for privacy mistakes.
# Neither replaces the other — the docs/private/ leak had no secret in it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan every commit

      - name: Install gitleaks
        run: |
          VERSION=8.30.1  # pinned to match .pre-commit-config.yaml
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" version

      - name: Scan git history for secrets
        run: |
          "$RUNNER_TEMP/gitleaks" git . --redact --no-banner --config .gitleaks.toml

      - name: No tracked files match .gitignore (structural privacy guard)
        run: scripts/check-tracked-vs-gitignore.sh
