name: Snap Build & Publish

# Auto-triggers disabled May 2026 — Snap build has been failing on every push
# since 2026-04-17 and adds noise to PR check status during the alpha-critical
# path. Linux users on the alpha cohort can install from PyPI; the Snap-only
# slice of users is small enough to defer until autumn 2026 (post-TestFlight,
# during beta). Workflow remains runnable via the GitHub Actions UI when ready
# to revisit. Re-enable by restoring the `push` + `pull_request` triggers.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege default — GITHUB_TOKEN read-only. Publish jobs authenticate
# to the Snap Store with SNAPCRAFT_STORE_CREDENTIALS (a secret), not the repo
# token, so no job needs write here. Supply-chain hardening 2026-06-04.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SHA-pinned (supply-chain) — immutable commit, version tracked in comment.
      - uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79  # v1.3.0
        id: snapcraft

      - uses: actions/upload-artifact@v4
        with:
          name: snap-amd64
          path: ${{ steps.snapcraft.outputs.snap }}

  publish-edge:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    env:
      HAS_CREDS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS != '' }}
    steps:
      - uses: actions/download-artifact@v4
        if: env.HAS_CREDS == 'true'
        with:
          name: snap-amd64

      - uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40  # v1.2.0 (SHA-pinned)
        if: env.HAS_CREDS == 'true'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: "*.snap"
          release: edge

      - name: Skip publish (no credentials)
        if: env.HAS_CREDS != 'true'
        run: echo "Skipping publish — SNAPCRAFT_STORE_CREDENTIALS not set"

  publish-stable:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    env:
      HAS_CREDS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS != '' }}
    steps:
      - uses: actions/download-artifact@v4
        if: env.HAS_CREDS == 'true'
        with:
          name: snap-amd64

      - uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40  # v1.2.0 (SHA-pinned)
        if: env.HAS_CREDS == 'true'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: "*.snap"
          release: stable

      - name: Skip publish (no credentials)
        if: env.HAS_CREDS != 'true'
        run: echo "Skipping publish — SNAPCRAFT_STORE_CREDENTIALS not set"
