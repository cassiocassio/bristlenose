<!doctype html>
<meta charset="utf-8">
<title>Bristlenose — Colour Adjudicator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Colour Adjudicator — for every hardcoded colour in the theme, hold the desired
     chip against the full token menu (name · semantic · hex · chip) and decide by eye:
     map it to an existing token (by meaning OR by colour), or demand a new brick.
     No distance math — your eye is the nearest-neighbour engine. Decisions persist
     locally and export as a worklist. Seeded with the real backlog, 12 Jul 2026. -->

<style>
:root{
  color-scheme: light dark;
  --g:#f4f5f7; --panel:#fff; --panel2:#fafbfc; --ink:#181b22; --mut:#5c6570; --faint:#8b94a1;
  --hair:#e4e7ec; --hair2:#eef0f3; --accent:#4c62d8; --new:#c8007a; --new-bg:#fbe6f2;
  --ok:#12996a; --ok-bg:#e7f6ef; --shadow:0 1px 2px rgba(20,24,33,.06),0 8px 24px rgba(20,24,33,.06);
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --g:#0c0e12; --panel:#14171d; --panel2:#171b22; --ink:#e7eaf0; --mut:#8d96a4; --faint:#6b7482;
  --hair:#242832; --hair2:#1d222b; --accent:#8095ff; --new:#ff64c9; --new-bg:#2c0c22;
  --ok:#3fd39a; --ok-bg:#0f2a20; --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{color-scheme:light;--g:#f4f5f7;--panel:#fff;--panel2:#fafbfc;--ink:#181b22;--mut:#5c6570;--faint:#8b94a1;--hair:#e4e7ec;--hair2:#eef0f3;--accent:#4c62d8;--new:#c8007a;--new-bg:#fbe6f2;--ok:#12996a;--ok-bg:#e7f6ef;}
:root[data-theme="dark"]{color-scheme:dark;--g:#0c0e12;--panel:#14171d;--panel2:#171b22;--ink:#e7eaf0;--mut:#8d96a4;--faint:#6b7482;--hair:#242832;--hair2:#1d222b;--accent:#8095ff;--new:#ff64c9;--new-bg:#2c0c22;--ok:#3fd39a;--ok-bg:#0f2a20;}

*{box-sizing:border-box;}
body{margin:0;background:var(--g);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;}
.bar{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--panel) 90%,transparent);backdrop-filter:blur(10px) saturate(1.4);border-bottom:1px solid var(--hair);}
.bar-in{max-width:1240px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.bar b{font-size:15px;font-weight:650;letter-spacing:-.01em;}
.eyebrow{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);}
.prog{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--mut);display:flex;align-items:center;gap:10px;}
.prog .track{width:120px;height:7px;border-radius:4px;background:var(--hair2);overflow:hidden;border:1px solid var(--hair);}
.prog .track i{display:block;height:100%;background:var(--ok);width:0;transition:width .25s;}
.btn{font-family:var(--mono);font-size:11.5px;padding:5px 11px;border-radius:7px;border:1px solid var(--hair);background:var(--panel);color:var(--ink);cursor:pointer;transition:border-color .12s,background .12s;}
.btn:hover{border-color:var(--accent);}

.wrap{max-width:1240px;margin:0 auto;padding:16px 18px 60px;display:grid;grid-template-columns:300px 1fr;gap:18px;}
@media(max-width:880px){.wrap{grid-template-columns:1fr;}}

/* ── queue rail ── */
.queue{align-self:start;position:sticky;top:66px;background:var(--panel);border:1px solid var(--hair);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;max-height:calc(100vh - 84px);display:flex;flex-direction:column;}
.queue-head{padding:11px 14px;border-bottom:1px solid var(--hair);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.queue-head .eyebrow{margin-right:auto;}
.qfilter{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:999px;border:1px solid var(--hair);background:var(--panel);color:var(--mut);cursor:pointer;}
.qfilter[aria-pressed="true"]{background:var(--ink);color:var(--panel);border-color:var(--ink);}
.qlist{overflow-y:auto;padding:6px;}
.qrow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;border:1px solid transparent;}
.qrow:hover{background:var(--panel2);}
.qrow[aria-selected="true"]{background:var(--panel2);border-color:var(--accent);}
.qrow .sw{width:26px;height:26px;border-radius:6px;border:1px solid var(--hair);flex-shrink:0;background-clip:padding-box;}
.qrow .meta{min-width:0;flex:1;}
.qrow .v{font-family:var(--mono);font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qrow .sub{font-size:10.5px;color:var(--faint);}
.qrow .verdict{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:5px;flex-shrink:0;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.verdict.map{background:var(--ok-bg);color:var(--ok);} .verdict.new{background:var(--new-bg);color:var(--new);} .verdict.skip{background:var(--hair2);color:var(--faint);}

/* ── adjudicator ── */
.main{min-width:0;}
.desired{background:var(--panel);border:1px solid var(--hair);border-radius:13px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px;position:sticky;top:66px;z-index:5;}
.desired-top{display:flex;gap:16px;align-items:center;}
.desired .bigsw{width:76px;height:76px;border-radius:12px;border:1px solid var(--hair);flex-shrink:0;}
.desired .val{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-.01em;}
.desired .ctx{font-size:12.5px;color:var(--mut);margin-top:3px;}
.desired .ctx b{color:var(--ink);font-weight:600;}
.desired .q{font-size:13px;color:var(--faint);margin-top:10px;}
.sites{margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--mut);max-height:0;overflow:hidden;transition:max-height .2s;}
.sites.open{max-height:240px;overflow-y:auto;}
.sites div{padding:2px 0;border-bottom:1px solid var(--hair2);}
.sites .prop{color:var(--accent);} .sites .sel{color:var(--faint);}
.sites-toggle{font-family:var(--mono);font-size:11px;color:var(--accent);cursor:pointer;background:none;border:0;padding:6px 0 0;}
.actions{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap;}
.act-new{font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;border:1px solid var(--new);background:var(--new-bg);color:var(--new);cursor:pointer;}
.act-skip{font-family:var(--sans);font-size:13px;padding:9px 14px;border-radius:9px;border:1px solid var(--hair);background:var(--panel);color:var(--mut);cursor:pointer;}

.menu-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 10px;}
.menu-head h2{font-size:15px;font-weight:640;margin:0;}
.grp{margin-bottom:14px;}
.grp-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);padding:0 2px 6px;}
.tokens{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;}
.tok{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--hair);border-radius:10px;background:var(--panel);cursor:pointer;text-align:left;transition:border-color .1s,background .1s;}
.tok:hover{border-color:var(--accent);background:var(--panel2);}
.tok.chosen{border-color:var(--ok);background:var(--ok-bg);}
.tok .pair{display:flex;flex-shrink:0;border-radius:6px;overflow:hidden;border:1px solid var(--hair);}
.tok .pair span{width:20px;height:34px;display:block;}
.tok .info{min-width:0;}
.tok .name{font-family:var(--mono);font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tok .sem{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tok .hex{font-family:var(--mono);font-size:10px;color:var(--faint);}

.done{background:var(--panel);border:1px dashed var(--hair);border-radius:13px;padding:40px 20px;text-align:center;color:var(--mut);}
.done b{color:var(--ink);}
footer{max-width:1240px;margin:0 auto;padding:14px 18px 40px;font-size:12px;color:var(--faint);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
</style>

<div class="bar"><div class="bar-in">
  <b>Colour Adjudicator</b><span class="eyebrow">what was this colour meant to be?</span>
  <div class="prog"><span id="pcount">0 / 0</span><span class="track"><i id="pbar"></i></span>
    <button class="btn" id="exportBtn">Export decisions</button></div>
</div></div>

<div class="wrap">
  <aside class="queue">
    <div class="queue-head"><span class="eyebrow">Backlog</span>
      <button class="qfilter" data-f="todo" aria-pressed="true">to&nbsp;do</button>
      <button class="qfilter" data-f="hex" aria-pressed="false">hex</button>
      <button class="qfilter" data-f="all" aria-pressed="false">all</button>
    </div>
    <div class="qlist" id="qlist"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<footer>Seeded with the theme's real hardcoded colours (12 Jul 2026). Your eye picks the meaning or the colour; the tool never guesses. Decisions save in this browser and export as a worklist — advisory only, nothing is enforced.</footer>

const GROUP_ORDER = ["Surfaces","Text","Accent & state","Semantic action","Sentiment","Lines & icons","Data","Other"];
const LS = "bn-colour-adjudications-v1";
let decisions = {};
try { decisions = JSON.parse(localStorage.getItem(LS)||"{}"); } catch(e){}
let filter = "todo";
let selected = null;

const $ = s => document.querySelector(s);
function save(){ try{ localStorage.setItem(LS, JSON.stringify(decisions)); }catch(e){} }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function isDark(hex){ // rough luminance for chip border contrast only
  const m=/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(hex); if(!m) return false;
  let h=m[1]; if(h.length===3) h=h.split("").map(c=>c+c).join("");
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return (0.2126*r+0.7152*g+0.0722*b) < 128;
}

function queueItems(){
  return DATA.backlog.filter(it=>{
    if(filter==="hex") return it.kind==="hex";
    if(filter==="todo") return !decisions[it.value.toLowerCase()];
    return true;
  });
}
function renderQueue(){
  const list = $("#qlist"); list.innerHTML="";
  DATA.backlog.forEach((it,i)=>{
    if(filter==="hex" && it.kind!=="hex") return;
    if(filter==="todo" && decisions[it.value.toLowerCase()]) return;
    const d = decisions[it.value.toLowerCase()];
    const row = document.createElement("div");
    row.className="qrow"; row.dataset.i=i;
    row.setAttribute("aria-selected", selected===i ? "true":"false");
    const vbadge = d ? `<span class="verdict ${d.verdict}">${d.verdict==="map"?esc(d.token.replace("--bn-colour-","").replace("--bn-","")):d.verdict.toUpperCase()}</span>` : "";
    row.innerHTML = `<span class="sw" style="background:${esc(it.value)}"></span>
      <span class="meta"><span class="v">${esc(it.value)}</span>
        <span class="sub">${it.sites.length} site${it.sites.length>1?"s":""} · ${esc(it.sites[0].file.split("/").pop())}</span></span>${vbadge}`;
    row.onclick=()=>{ selected=i; render(); };
    list.appendChild(row);
  });
  const total = DATA.backlog.length, done = Object.keys(decisions).length;
  $("#pcount").textContent = `${done} / ${total}`;
  $("#pbar").style.width = (100*done/total)+"%";
}

function chipPair(light, dark){
  return `<span class="pair"><span style="background:${esc(light)}"></span><span style="background:${esc(dark)}"></span></span>`;
}
function renderMain(){

  const byGroup = {};
  DATA.menu.forEach(t=>{ (byGroup[t.group]=byGroup[t.group]||[]).push(t); });
  const menuHTML = GROUP_ORDER.filter(g=>byGroup[g]).map(g=>`
    <div class="grp"><div class="grp-label">${esc(g)}</div><div class="tokens">
      ${byGroup[g].map(t=>`<button class="tok ${d&&d.verdict==="map"&&d.token===t.token?"chosen":""}" data-token="${esc(t.token)}">
        ${chipPair(t.light,t.dark)}
        <span class="info"><span class="name">${esc(t.token.replace("--bn-",""))}</span>
          <span class="sem">${esc(t.semantic)}</span>
          <span class="hex">${esc(t.light)}${t.dark!==t.light?" / "+esc(t.dark):""}</span></span>
      </button>`).join("")}
    </div></div>`).join("");

  main.innerHTML = `
    <div class="desired">
      <div class="desired-top">
        <span class="bigsw" style="background:${esc(it.value)}"></span>
        <div>
          <div class="val">${esc(it.value)}</div>
          <div class="ctx"><b>${esc(it.kind)}</b> · used in <b>${it.sites.length}</b> place${it.sites.length>1?"s":""}
            · first: ${esc(it.sites[0].file)}:${it.sites[0].line}</div>
          <div class="q">Pick the token this was meant to be — by <b>meaning</b> or by <b>colour</b> — or demand a new one.</div>
        </div>
      </div>
      <button class="sites-toggle" id="sitesToggle">▸ show all ${it.sites.length} site${it.sites.length>1?"s":""}</button>
      <div class="sites" id="sites">${sitesHTML}</div>
      <div class="actions">
        <button class="act-new" data-verdict="new">⬥ Needs a new colour</button>
        <button class="act-skip" data-verdict="skip">Not a colour pick (shadow / scrim / skip)</button>
      </div>
    </div>
    <div class="menu-head"><h2>Token menu</h2><span class="eyebrow">${DATA.menu.length} tokens · light / dark chips</span></div>
    ${menuHTML}
  `;

  main.querySelectorAll(".tok").forEach(b=> b.onclick=()=> decide(key, {verdict:"map", token:b.dataset.token}));
  main.querySelectorAll("[data-verdict]").forEach(b=> b.onclick=()=> decide(key, {verdict:b.dataset.verdict}));
  const st = $("#sitesToggle"); st.onclick=()=>{ $("#sites").classList.toggle("open"); st.textContent = $("#sites").classList.contains("open")?"▾ hide sites":`▸ show all ${it.sites.length} sites`; };
}

function decide(key, verdict){
  decisions[key] = verdict; save();
  // advance to next undecided
  const next = DATA.backlog.findIndex(it=>!decisions[it.value.toLowerCase()]);
  selected = next>=0 ? next : selected;
  render();
}
function render(){ renderQueue(); renderMain(); }

document.querySelectorAll(".qfilter").forEach(b=> b.onclick=()=>{
  filter=b.dataset.f;
  document.querySelectorAll(".qfilter").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
  renderQueue();
});
$("#exportBtn").onclick=()=>{
  const lines=[]; const byToken={};
  DATA.backlog.forEach(it=>{
    const d=decisions[it.value.toLowerCase()]; if(!d) return;
    it.sites.forEach(s=>{
      const to = d.verdict==="map" ? `var(${d.token})` : d.verdict==="new" ? "NEW-TOKEN-NEEDED" : "SKIP";
      lines.push(`${s.file}:${s.line}  ${s.prop}: ${it.value}  ->  ${to}`);
    });
    if(d.verdict==="new") (byToken.__new=byToken.__new||[]).push(it.value);
  });
  const txt = "# Colour adjudication worklist\n\n"+lines.join("\n")+
    "\n\n# New bricks demanded:\n"+((byToken.__new||[]).map(v=>"  "+v).join("\n")||"  (none)");
  navigator.clipboard.writeText(txt).then(()=> $("#exportBtn").textContent="Copied ✓", ()=>{});
  setTimeout(()=> $("#exportBtn").textContent="Export decisions", 1500);
};

render();
</script>
