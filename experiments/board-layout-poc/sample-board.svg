<g>
<rect x="92.0" y="248.0" width="240.0" height="200.0" rx="10" ry="10" fill="#FFF9B1" stroke="#E3D9A6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="108.0" y="278.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">“I found the dashboard</text>
<text x="108.0" y="296.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">pretty confusing at first. I</text>
<text x="108.0" y="314.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">couldn&#x27;t figure out where my</text>
<text x="108.0" y="332.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">settings were.”</text>
<text x="108.0" y="434.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" font-style="italic" xml:space="preserve">— P1 · 0:10</text>
</g>
<g>
<rect x="92.0" y="472.0" width="240.0" height="200.0" rx="10" ry="10" fill="#FFF9B1" stroke="#E3D9A6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="108.0" y="502.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">“The navigation was hidden</text>
<text x="108.0" y="520.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">behind a hamburger menu. I</text>
<text x="108.0" y="538.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">kept looking for a sidebar</text>
<text x="108.0" y="556.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">but there wasn&#x27;t one.”</text>
<text x="108.0" y="658.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" font-style="italic" xml:space="preserve">— P1 · 0:26</text>
</g>
<g>
<rect x="368.0" y="148.0" width="240.0" height="76.0" rx="10" ry="10" fill="#FADADD" stroke="#E8B7C0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="488.0" y="180.0" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#2B2B2B">Search</text>
<text x="488.0" y="200.0" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8a6b72">1 quote(s)</text>
</g>
<g>
<rect x="368.0" y="248.0" width="240.0" height="200.0" rx="10" ry="10" fill="#FFF9B1" stroke="#E3D9A6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="384.0" y="278.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">“The search was great</text>
<text x="384.0" y="296.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">actually. It was fast and</text>
<text x="384.0" y="314.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">the results were really</text>
<text x="384.0" y="332.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">relevant. That was probably</text>
<text x="384.0" y="350.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">the best part of the whole</text>
<text x="384.0" y="368.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">thing.”</text>
<text x="384.0" y="434.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" font-style="italic" xml:space="preserve">— P1 · 0:46</text>
</g>
<g>
<rect x="736.0" y="148.0" width="240.0" height="76.0" rx="10" ry="10" fill="#FADADD" stroke="#E8B7C0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="856.0" y="180.0" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#2B2B2B">Onboarding gaps</text>
<text x="856.0" y="200.0" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8a6b72">1 quote(s)</text>
</g>
<g>
<rect x="736.0" y="248.0" width="240.0" height="200.0" rx="10" ry="10" fill="#FFF9B1" stroke="#E3D9A6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="752.0" y="278.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">“I think the onboarding</text>
<text x="752.0" y="296.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">could be better. When I</text>
<text x="752.0" y="314.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">first signed up I had no</text>
<text x="752.0" y="332.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">idea what to do. A quick</text>
<text x="752.0" y="350.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">tutorial or walkthrough</text>
<text x="752.0" y="368.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" xml:space="preserve">would have helped a lot.”</text>
<text x="752.0" y="434.0" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#2B2B2B" font-style="italic" xml:space="preserve">— P1 · 1:06</text>
